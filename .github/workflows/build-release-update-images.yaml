name: Build, Release, Update images

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y fontforge python3-fontforge fonttools ttfautohint

      - name: Generate fonts
        run: make setup && make all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jetple-ttfs
          path: out/*.ttf

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: jetple-ttfs

      - name: Package artifacts
        run: zip Jetple.zip Jetple-*.ttf && zip JetpleSlim.zip JetpleSlim-*.ttf

      - name: Create GitHub release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            Jetple.zip
            JetpleSlim.zip

  update-images:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout sample-images branch
        uses: actions/checkout@v5
        with:
          ref: sample-images

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: jetple-ttfs

      - name: Install fonts
        run: sudo mv Jetple*.ttf /usr/share/fonts/ && fc-cache -fv

      - name: Set up svg-to-webp
        run: |
          git clone https://github.com/negset/svg-to-webp.git
          cd svg-to-webp
          npm install

      - name: Create WebPs
        run: node svg-to-webp *.svg

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.webp
          git commit -m "update images" || echo "No changes to commit"
          git push origin sample-images
